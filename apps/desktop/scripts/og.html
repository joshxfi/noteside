<!doctype html>
<!--
  Branded Open Graph card (1200×630) for Noteside, rendered with the real
  Newsreader + IBM Plex Mono fonts via headless Chrome — the same pipeline as
  mark.html. Two variants via the query string: ?variant=landing (default) | docs.

  Render (be online — fonts load from Google Fonts; background is baked opaque):
    CHROME="/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
    "$CHROME" --headless=new --disable-gpu --hide-scrollbars \
      --force-device-scale-factor=1 --window-size=1200,630 \
      --virtual-time-budget=8000 --default-background-color=fff9f5ed \
      --screenshot=apps/landing/public/og.png \
      'file://ABS/apps/desktop/scripts/og.html?variant=landing'
    "$CHROME" … --screenshot=apps/docs/public/og.png 'file://ABS/apps/desktop/scripts/og.html?variant=docs'
  (or run `pnpm og:build` from the repo root)
-->
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f9f5ed;
        --ink: #3b2f27;
        --ink-soft: #6b5d52;
        --plum: #a05e7e;
        --rule: #e0d8ce;
        --serif: "Newsreader", Georgia, serif;
        --mono: "IBM Plex Mono", ui-monospace, monospace;
      }
      html,
      body {
        margin: 0;
      }
      .og {
        width: 1200px;
        height: 630px;
        box-sizing: border-box;
        background: var(--paper);
        padding: 96px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 34px;
        position: relative;
        overflow: hidden;
      }
      .og::after {
        content: "";
        position: absolute;
        inset: 26px;
        border: 1px solid var(--rule);
        border-radius: 22px;
        pointer-events: none;
      }
      .eyebrow {
        margin: 0;
        font-family: var(--mono);
        font-size: 22px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--plum);
      }
      .lockup {
        display: flex;
        align-items: center;
        gap: 30px;
      }
      .mark {
        flex: none;
        width: 128px;
        height: 128px;
        border-radius: 24%;
        background: var(--paper);
        box-shadow: inset 0 0 0 2px var(--rule);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
      }
      .mark .n {
        font-family: var(--serif);
        font-weight: 600;
        font-size: 74px;
        line-height: 1;
        color: var(--ink);
      }
      .mark .cur {
        width: 13px;
        height: 54px;
        border-radius: 3px;
        background: var(--plum);
      }
      .word {
        display: inline-flex;
        align-items: center;
        font-family: var(--serif);
        font-weight: 600;
        font-size: 100px;
        letter-spacing: -0.02em;
        line-height: 1;
        color: var(--ink);
      }
      .word .bcur {
        display: inline-block;
        width: 0.4em;
        height: 0.74em;
        margin-left: 0.14em;
        border-radius: 0.05em;
        background: var(--plum);
        transform: translateY(0.04em);
      }
      .tagline {
        margin: 0;
        max-width: 20ch;
        font-family: var(--serif);
        font-size: 44px;
        line-height: 1.22;
        color: var(--ink-soft);
      }
      .foot {
        position: absolute;
        left: 96px;
        bottom: 78px;
        font-family: var(--mono);
        font-size: 22px;
        color: var(--ink-soft);
      }
    </style>
  </head>
  <body>
    <div class="og">
      <p class="eyebrow" id="eyebrow">Notes for keyboard people</p>
      <div class="lockup">
        <span class="mark"><span class="n">N</span><span class="cur"></span></span>
        <span class="word">Noteside<span class="bcur"></span></span>
      </div>
      <p class="tagline" id="tagline">
        An offline, local-first notebook you drive from the keyboard.
      </p>
      <div class="foot" id="foot">noteside.app</div>
    </div>
    <script>
      var v = new URLSearchParams(location.search).get("variant") || "landing";
      if (v === "docs") {
        document.getElementById("eyebrow").textContent = "Documentation";
        document.getElementById("tagline").textContent = "Guides, keybindings, and configuration.";
        document.getElementById("foot").textContent = "docs.noteside.app";
      }
    </script>
  </body>
</html>

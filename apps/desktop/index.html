<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noteside</title>
    <!-- Fonts are bundled locally (see src/fonts.ts) so the app runs fully offline. -->
    <script>
      // Fill the frame edge-to-edge when embedded in the landing demo, or when
      // running inside the Tauri window (the OS provides the window frame).
      if (location.search.indexOf("embed") > -1 || "__TAURI_INTERNALS__" in window)
        document.documentElement.classList.add("embed");
      // Native window only (not the landing iframe) — used to round the window corners.
      if ("__TAURI_INTERNALS__" in window) document.documentElement.classList.add("tauri");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

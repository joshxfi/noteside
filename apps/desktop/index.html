<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noteside</title>
    <!-- Fonts are bundled locally (see src/fonts.ts) so the app runs fully offline. -->
    <script>
      // Fill the frame edge-to-edge when embedded in the landing demo, or when
      // running inside the Tauri window (the OS provides the window frame).
      if (location.search.indexOf("embed") > -1 || "__TAURI_INTERNALS__" in window)
        document.documentElement.classList.add("embed");
      // Native window only (not the landing iframe) — used to round the window corners.
      if ("__TAURI_INTERNALS__" in window) document.documentElement.classList.add("tauri");
      // Theme mirror (written by the config-apply effect): set data-theme + the
      // theme's inline vars BEFORE first paint, so a dark/base16 user never sees
      // a light flash while the config store loads. The store stays the source of
      // truth — this is a paint-time hint only.
      try {
        var t = JSON.parse(localStorage.getItem("noteside:boot-theme"));
        if (t && (t.mode === "dark" || t.mode === "light")) {
          document.documentElement.setAttribute("data-theme", t.mode);
          if (t.vars)
            for (var k in t.vars)
              if (k.indexOf("--") === 0 && typeof t.vars[k] === "string")
                document.documentElement.style.setProperty(k, t.vars[k]);
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

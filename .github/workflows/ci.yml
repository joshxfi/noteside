name: CI

# Quality gate in front of the release pipeline. Runs on every PR and on pushes
# to main. The same checks AGENTS.md names as the gates: typecheck + lint +
# format + the JS and Rust test suites, plus a Rust compile check.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Typecheck, lint, format & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test

  rust:
    name: Rust check & test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

name: Release

# Deliberate, batched releases. You commit feat:/fix:/etc. freely to main; the
# website + docs deploy on every push as usual. When you want to ship the
# desktop app, run this workflow manually — semantic-release rolls every commit
# since the last tag into one version, writes the changelog, and tags it. The
# workflow creates a DRAFT release, the matrix attaches every native binary,
# and a final job publishes it only after the complete matrix succeeds.
# Use the dry_run input first to preview the version + notes without shipping.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — compute the next version & notes only; no tag, release, or build."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release:
    name: Version & changelog
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # commit the changelog/version bump + push the tag
    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
      published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: true # so @semantic-release/git can push

      - uses: actions/setup-node@v6
        with:
          node-version: 24 # runner node for the bump script (exec prepareCmd)

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/exec@6
            @semantic-release/git@10
            conventional-changelog-conventionalcommits@8
          dry_run: ${{ inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create draft GitHub release
        if: steps.semantic.outputs.new_release_published == 'true' && !inputs.dry_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.semantic.outputs.new_release_version }}
          RELEASE_NOTES: ${{ steps.semantic.outputs.new_release_notes }}
        run: gh release create "v${VERSION}" --draft --title "Noteside v${VERSION}" --notes "${RELEASE_NOTES}"

  build:
    name: Build · ${{ matrix.label }}
    needs: release
    if: needs.release.outputs.published == 'true' && !inputs.dry_run
    timeout-minutes: 45 # cross-platform tauri bundling on a cold cache
    permissions:
      contents: write # upload assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - label: macOS (Intel)
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - label: Linux
            platform: ubuntu-22.04
            args: ""
          - label: Windows
            platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }} # the commit semantic-release just tagged

      # pnpm/action-setup reads the pnpm version from packageManager in package.json
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0.6 # latest line; there is no v1 tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          # The draft already exists; each matrix leg uploads its platform's bundles.
          tagName: v${{ needs.release.outputs.version }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    name: Publish complete release
    needs: [release, build]
    if: needs.release.outputs.published == 'true' && !inputs.dry_run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish draft after every native build succeeds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: gh release edit "v${VERSION}" --draft=false --latest
